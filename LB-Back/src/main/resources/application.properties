spring.application.name=lastlayersvr

#============================================
# lastlayer 추가 사항
# FastAPI 서버 주소 설정
# ${FASTAPI_URL}은 시스템 환경변수를 참조하며, 없을 경우 : 뒤의 주소를 기본값으로 사용합니다.
external.fastapi.prefix=http://localhost:8000/api/v1

# (옵션) 타임아웃 설정도 함께 관리하면 좋습니다.
external.fastapi.connect-timeout=5000
external.fastapi.read-timeout=30000

# Swagger UI 경로 변경
springdoc.swagger-ui.path=/docs

# db 접속 정도등 보안 유지 관련 내용을 분리
spring.config.import=security.properties
spring.jpa.open-in-view=false
# src\main\resources\data.sql 을 지정 
#spring.sql.init.data-locations=classpath:data.sql

# data.sql 을 항상 실행 한다.
spring.sql.init.mode=always
# data.sql을 스키마 작성 이후 샐행 되게 한다.
spring.jpa.defer-datasource-initialization=true

# file upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# JWT 만료 시간(분단위) 10080 = 1주일
jwt.expiration=10080
jwt.refresh.expiration=10080

# 모든 API의 기본 주소
server.servlet.context-path=/api/lastlayer
file.upload-dir=c:/lastlayer/upload

# Using generated security password: 6fe1d9c1-386a-449f-9493-917c11ad6455 이것 안나오게
spring.security.user.password=123456
#============================================
# none, create, update, validate
spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3

# HikariCP 설정 - 최소 유휴 연결 수 (선택 사항)
spring.datasource.hikari.minimum-idle=2

# 운영 환경(production)에서는 SQL 로그
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# SQL 주석을 출력할지 여부
spring.jpa.properties.hibernate.use_sql_comments=true

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.springframework.web=debug
